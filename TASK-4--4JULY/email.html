<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h1>Login</h1>
    <form action="some.html" method="post">
        <label for="username">Username:</label>
        <input type="email" id="username" placeholder="Enter your email" name="username" required><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter your password" name="password" pattern="(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[!@#$%^&*]).{8,16}" title="Password must contain at least one uppercase letter, one lowercase letter, one digit, one special character, and be between 8 and 16 characters long." required><br><br>
        <input type="submit" value="Login">
    </form>
</body>
</html>
